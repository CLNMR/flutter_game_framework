targets:
    $default:
        builders:
            json_serializable:
                options:
                    any_map: true
                    explicit_to_json: true
            flutter_game_framework_core|generator:
                enabled: true

builders:
  generator:
    import: "package:flutter_game_framework_core/src/codegen/builders/builder.dart"
    builder_factories: ["generateService"]
    build_extensions: { ".dart": [".service.dart"] }
    auto_apply: root_package
    build_to: source
    applies_builders: ["source_gen|combining_builder"]