name: flutter_game_framework_ui
description: "The UI framework for the flutter_game_framework_core."
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.38.0"

dependencies:
  analyzer: '>=6.0.0 <10.0.0'
  build: ^4.0.5
  code_builder: ^4.11.1
  collection: ^1.19.0
  dart_style: ^3.1.3
  easy_localization: ^3.0.7
  expandable: ^5.0.1
  firebase_auth: ^6.0.1
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  flutter_localizations:
    sdk: flutter
  go_router: ^17.1.0
  google_fonts: ^6.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  meta: ^1.17.0
  riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.5
  source_gen: ^4.2.2
  yust: ^3.21.1
  yust_ui: ^3.21.0
  flutter_game_framework_core:
    path: ../flutter_game_framework_core
  pub_semver: ^2.2.0

dev_dependencies:
  build_runner: ^2.4.0
  custom_lint: ^0.8.1
  dart_code_metrics_presets: ^2.20.0
  flutter_game_framework_lints:
    path: ../flutter_game_framework_lints
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0
  lints: ^3.0.0
  matcher: ^0.12.17
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
        - family: CustomIcons
          fonts:
              - asset: assets/fonts/CustomIcons.ttf
        - family: Roboto
          fonts:
            - asset: assets/fonts/Roboto/Roboto-Regular.ttf
            - asset: assets/fonts/Roboto/Roboto-Bold.ttf
              weight: 700
  assets:
    - assets/localizables/en-US.json
    - assets/localizables/de-DE.json
